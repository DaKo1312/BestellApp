<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/icons/menu-icon-white.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="style.css">
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/storage.js"></script>
    <script src="./scripts/db.js"></script>
    <script src="script.js" defer></script>
    <title>Hunger? 🍔🍕🥗 BestellApp</title>
</head>
<body onload="renderMyDishesBs()">
    <header>
        <div class="header_content">
            <img class="logo_header" src="./assets/icons/logo-header.svg">
            <img class="burger_menu_btn" src="./assets/icons/burger_menu.svg">
        </div>
    </header>

    <main>
        <section id="main_top">
            <img class="main_img" src="./assets/img/header-image.jpg">
            <img class="main_logo" src="./assets/icons/main-icon.png">
        </section>
        <section id="main_headline">
            <div class="headline_content">
                <h1><span>Burger</span>House</h1>
                <img class="rating_icon" src="./assets/icons/rating-icon.png">
            </div>
            <div class="subline">
                <p>The best of Burgers, Pizza, and Greens, all in one great Place.</p>
            </div>
        </section>

            <div class="dishes_banner">
                <img src="./assets/icons/burger-icon.png">
                <h2>Burger & Sandwiches</span></h2>
            </div>
            <section id="dishes_container_bs">
                <div class="dishes_bs"></div>
            </section>

            <div class="dishes_banner">
                <img src="./assets/icons/pizza-icon.png">
                <h2>Pizza <span>(30cm)</span></h2>
            </div>
            <section id="dishes_container_p">
                <div class="dishes_p"></div>
            </section>

            <div class="dishes_banner">
                <img src="./assets/icons/salad-icon.png">
                <h2>Salad</h2>
            </div>
            <section id="dishes_container_s">
                <div class="dishes_s"></div>
            </section>
    </main>

    <footer>
        <div class="footer_content">
            <div class="footer_copyright">
                <img src="./assets/icons/copyright.svg">
                <p>2025 BurgerHouse</p>
            </div>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </div>
    </footer>

</body>
</html>
