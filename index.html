<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/icons/menu-icon-white.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/overlay.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="style.css">
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/storage.js"></script>
    <script src="./scripts/db.js"></script>
    <script src="script.js" defer></script>
    <title>Hunger? 🍔🍕🥗 BestellApp</title>
</head>
<body onload="renderMyDishesBs()">
    <header>
        <div class="header_content">
            <img class="logo_header" src="./assets/icons/logo-header.svg">
            <img class="burger_menu_btn" src="./assets/icons/burger_menu.svg">
        </div>
    </header>

    <section id="main_top">
        <div class="main_top_content">
            <img class="main_img" src="./assets/img/header-image.jpg">
        </div>
    </section>
    
    <main>
        <div class="main_logo">
            <img src="./assets/icons/main-icon.png">
        </div>
    
        <section id="main_headline">
            <div class="headline_content">
                <h1><span>Burger</span>House</h1>
                <img class="rating_icon" src="./assets/icons/rating-icon.png">
            </div>
            <div class="subline">
                <p>The best of Burgers, Pizza, and Greens, all in one great Place.</p>
            </div>
        </section>

        <div class="layout_container">
            <section class="dishes_container">
                <div class="dishes_banner">
                    <div class="banner_content">
                        <img src="./assets/icons/burger-icon.png">
                        <h2>Burger & Sandwiches</h2>
                    </div>
                </div>
                <section id="dishes_container_bs">
                    <div class="container_content">
                        <div id="dishes_bs"></div>
                    </div>
                </section>

                <div class="dishes_banner">
                    <div class="banner_content">
                        <img src="./assets/icons/pizza-icon.png">
                        <h2>Pizza <span>(30cm)</span></h2>
                    </div>
                </div>
                <section id="dishes_container_p">
                    <div class="container_content">
                        <div id="dishes_p"></div>
                    </div>
                </section>

                <div class="dishes_banner">
                    <div class="banner_content">
                        <img src="./assets/icons/salad-icon.png">
                        <h2>Salad</h2>
                    </div>
                </div>
                <section id="dishes_container_s">
                    <div class="container_content">
                        <div id="dishes_s"></div>
                    </div>
                </section>
            </section>

            <aside id="basket_container" class="basket_container">
                <div id="basket_content">
                    <div class="basket_empty">
                        <h3>Your Basket</h3>
                        <p>
                        Nothing here yet.<br>
                        Go ahead and choose something delicious!
                        </p>
                        <img src="./assets/icons/shopping-cart-icon.png">
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer>
        <div class="footer_content">
            <div class="footer_copyright">
                <img src="./assets/icons/copyright.svg">
                <p>2025 BurgerHouse</p>
            </div>
            <p>Imprint</p>
            <p>Cookie Preferences</p>
        </div>
    </footer>

    <div id="order_overlay" class="overlay_none">
        <div class="order_popup">
            <button class="close_overlay" onclick="closeOverlay()">
                ✕
            </button>
            <img src="./assets/icons/delivery-truck-icon.png">
            <h3>Order confirmed!</h3>
            <p>Your food is on the way!</p>
        </div>
    </div>

</body>
</html>
